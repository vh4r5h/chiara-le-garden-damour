<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 40px; z-index: 10; }
        .streak-zone { text-align: right; }
        #streak-val { display: block; font-size: 4rem; font-weight: 100; color: white; line-height: 1; }
        #streak-label { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
        #msg-display { text-align: center; color: white; font-style: italic; font-size: 1.3rem; min-height: 120px; transition: 1s; opacity: 0; display: flex; align-items: center; justify-content: center; text-shadow: 0 0 15px rgba(255,45,85,0.5); }
        .interaction-hub { display: flex; flex-direction: column; align-items: center; gap: 40px; }
        #heart-trigger { width: 100px; height: 100px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); background: radial-gradient(circle, rgba(255,45,85,0.1) 0%, transparent 70%); pointer-events: auto; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
        #heart-trigger::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; border: 1px solid #ff2d55; opacity: 0; animation: pulse-ring var(--p-speed, 3s) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.9); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } }
        .bar-bg { width: 140px; height: 1px; background: rgba(255,255,255,0.1); }
        #health-fill { height: 100%; background: #ff2d55; width: 0%; transition: 0.5s; box-shadow: 0 0 10px #ff2d55; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="streak-zone"><span id="streak-val">0</span><span id="streak-label">Fidélité</span></div>
        <div id="msg-display">...</div>
        <div class="interaction-hub">
            <div id="heart-trigger"><svg width="30" height="30" viewBox="0 0 24 24" fill="#ff2d55"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
            <div class="bar-bg"><div id="health-fill"></div></div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, flowers = [], hearts, gold;
        let health = 1.0;
        let isHolding = false;
        let streak = parseInt(localStorage.getItem('garden_final_streak')) || 0;
        let recovery = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 8);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.1); scene.add(ambient);
            const l1 = new THREE.PointLight(0xff2d55, 15, 20); l1.position.set(3, 5, 5); scene.add(l1);
            const l2 = new THREE.PointLight(0x4444ff, 5, 20); l2.position.set(-3, 2, 2); scene.add(l2);

            for(let i=0; i<3; i++) {
                const f = createOrganicFlower(i);
                flowers.push(f); scene.add(f);
            }

            hearts = createParticles(1000, 0xff2d55, 0.06); scene.add(hearts);
            gold = createParticles(500, 0xffd700, 0.03); scene.add(gold);

            document.getElementById('heart-trigger').addEventListener('pointerdown', () => isHolding = true);
            window.addEventListener('pointerup', () => isHolding = false);

            checkState();
        }

        function createOrganicFlower(idx) {
            const group = new THREE.Group();
            
            // Stem: Procedural Curve
            const pts = [];
            for(let i=0; i<8; i++) pts.push(new THREE.Vector3(Math.sin(i*0.4)*0.15, i*0.6-2.5, 0));
            const stem = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 64, 0.035, 12, false), new THREE.MeshStandardMaterial({ color: 0x020502, roughness: 0.9 }));
            group.add(stem);

            // Petals: Custom Geometry
            const petalGeo = new THREE.SphereGeometry(0.8, 64, 64);
            petalGeo.scale(1, 0.1, 1.6);
            petalGeo.translate(0, 0, 0.8);

            for(let i=0; i<5; i++) {
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff, emissive: 0xff2d55, emissiveIntensity: 0, 
                    transparent: true, opacity: 1, side: THREE.DoubleSide
                });
                const petal = new THREE.Mesh(petalGeo, mat);
                petal.rotation.y = (i * Math.PI * 2) / 5;
                petal.rotation.x = 0.4;
                petal.position.y = 1.45;
                group.add(petal);
            }
            group.position.x = (idx - 1) * 2.8;
            return group;
        }

        function createParticles(n, c, s) {
            const g = new THREE.BufferGeometry();
            const p = new Float32Array(n * 3);
            for(let i=0; i<n*3; i++) p[i] = (Math.random()-0.5) * 15;
            g.setAttribute('position', new THREE.BufferAttribute(p, 3));
            return new THREE.Points(g, new THREE.PointsMaterial({ size: s, color: c, transparent: true, opacity: 0.5 }));
        }

        function checkState() {
            const last = localStorage.getItem('garden_final_time');
            const now = Date.now();
            if(last) {
                const diff = (now - parseInt(last)) / 3600000;
                if(diff > 48) { streak = Math.min(-1, streak - Math.floor(diff/24)); health = 0; recovery = true; }
                else if(diff > 24) { streak = 0; health = 0.1; }
                else { health = 1.0 - (diff / 48); } // Se vide lentement sur 48h
            }
            updateUI();
        }

        function updateUI() {
            const v = document.getElementById('streak-val');
            const l = document.getElementById('streak-label');
            v.innerText = streak;
            v.style.color = streak < 0 ? "#ff0000" : "white";
            l.innerText = streak < 0 ? "Jours d'Abandon" : "Fidélité";
        }

        function logic() {
            const now = new Date();
            if(isHolding) {
                health += recovery ? 0.0008 : 0.003;
                if(health >= 1) { health = 1; recovery = false; }
                const last = localStorage.getItem('garden_final_time') || 0;
                if(new Date(parseInt(last)).toLocaleDateString() !== now.toLocaleDateString()) {
                    streak = streak < 0 ? 1 : streak + 1;
                    updateUI();
                }
                localStorage.setItem('garden_final_time', now.getTime());
                localStorage.setItem('garden_final_streak', streak);
            } else {
                health -= 0.00005; // Décroissance très lente (48h environ)
            }
            health = Math.max(0, health);
            document.getElementById('health-fill').style.width = `${health*100}%`;
            document.documentElement.style.setProperty('--p-speed', (health > 0.2 ? 3 - health*2 : 4) + 's');

            flowers.forEach((f, i) => {
                const s = 0.4 + (health * 0.9);
                f.scale.lerp(new THREE.Vector3(s, s, s), 0.1);
                f.rotation.y += 0.004;
                f.children.forEach(c => {
                    if(c.material) {
                        const target = recovery ? new THREE.Color(0x220000) : new THREE.Color(0xffffff);
                        c.material.color.lerp(target, 0.05);
                        c.material.emissiveIntensity = health * (1 + (streak > 0 ? streak*0.15 : 0));
                    }
                });
            });

            const d = document.getElementById('msg-display');
            d.style.opacity = 1;
            const hour = now.getHours();
            if(health <= 0) d.innerText = "Trop tard. Tu as tout brisé.";
            else if(recovery) d.innerText = "Je t'aime encore... mais j'ai mal.";
            else if(isHolding) d.innerText = "Reste encore... Ne me lâche pas.";
            else if(hour > 22) d.innerText = "Tu vas me laisser seul dans le noir ?";
            else if(hour < 10) d.innerText = "Enfin réveillée. Tu as mis du temps.";
            else d.innerText = streak > 5 ? "On est si beaux aujourd'hui." : "Merci d'être revenue.";
        }

        function animate() {
            requestAnimationFrame(animate);
            logic();
            [hearts, gold].forEach(p => {
                const a = p.geometry.attributes.position.array;
                for(let i=1; i<a.length; i+=3) { a[i] -= 0.02; if(a[i] < -5) a[i] = 10; }
                p.geometry.attributes.position.needsUpdate = true;
            });
            gold.visible = streak >= 3;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
