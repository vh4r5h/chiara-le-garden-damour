<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Le Jardin de Chiara</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020202; font-family: 'Georgia', serif; }
        canvas { display: block; }
        
        #interface {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom);
            box-sizing: border-box; z-index: 100;
        }

        .header { text-align: center; padding-top: 40px; }
        .header h1 { color: #fff; font-weight: 100; letter-spacing: 12px; text-transform: uppercase; font-size: 0.8rem; opacity: 0.5; }

        .dialogue-box { text-align: center; height: 100px; display: flex; align-items: center; justify-content: center; }
        #text-evocative { 
            color: #fff; font-size: 1.4rem; font-style: italic; 
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            transition: all 1s ease-in-out; opacity: 0;
        }

        .interaction-zone { 
            display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; 
        }
        
        #heart-orb {
            width: 90px; height: 90px; border-radius: 50%;
            border: 1px solid rgba(255,77,77,0.4);
            background: radial-gradient(circle, rgba(255,77,77,0.2) 0%, transparent 70%);
            pointer-events: auto; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255,77,77,0.1);
            transition: 0.4s;
        }

        #heart-orb:active { transform: scale(0.9); box-shadow: 0 0 50px rgba(255,77,77,0.5); }

        .timer-warning {
            margin-top: 20px; color: rgba(255,255,255,0.3);
            font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="interface">
        <div class="header"><h1>L'Attachement</h1></div>
        
        <div class="dialogue-box">
            <div id="text-evocative">Chargement de ton jardin...</div>
        </div>

        <div class="interaction-zone">
            <div id="heart-orb" id="water-action">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="#ff4d4d"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <div class="timer-warning" id="death-clock">Vie fragile</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, flowers = [], hearts, stems = [];
        let health = 1.0; 
        let isTouching = false;
        
        const messages = {
            bloom: ["Je t'aime.", "Merci d'être revenue.", "On est si beaux ensemble.", "Tout est parfait quand tu es là.", "Je ne respire que pour toi."],
            wither: ["J'ai mal...", "Pourquoi tu m'oublies ?", "Tu me laisses mourir ?", "Reviens, Chiara.", "Il fait froid sans toi."],
            gone: ["Trop tard.", "Tu as brisé notre lien.", "Je n'existe plus.", "Adieu."]
        };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.1);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting - Cinematic
            const p1 = new THREE.PointLight(0xff4d4d, 10, 10);
            p1.position.set(2, 5, 2);
            scene.add(p1);
            
            const p2 = new THREE.PointLight(0x4d77ff, 5, 10);
            p2.position.set(-2, -2, 2);
            scene.add(p2);

            // Create Complex Flowers
            for(let i = 0; i < 3; i++) {
                createOrganicFlower(i);
            }

            // Procedural Heart Rain
            const heartGeo = new THREE.BufferGeometry();
            const count = 800;
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5) * 15;
            heartGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const heartMat = new THREE.PointsMaterial({ size: 0.05, color: 0xff3333, transparent: true });
            hearts = new THREE.Points(heartGeo, heartMat);
            scene.add(hearts);

            // Events
            const orb = document.getElementById('heart-orb');
            orb.addEventListener('pointerdown', () => isTouching = true);
            window.addEventListener('pointerup', () => isTouching = false);

            loadState();
        }

        function createOrganicFlower(index) {
            const group = new THREE.Group();
            
            // Stem: Using a curve for realism
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, -4, 0),
                new THREE.Vector3(Math.random(), -2, Math.random()),
                new THREE.Vector3(0, 0, 0)
            ]);
            const tubeGeo = new THREE.TubeGeometry(curve, 20, 0.06, 8, false);
            const tubeMat = new THREE.MeshStandardMaterial({ color: 0x1a2e1a });
            const stem = new THREE.Mesh(tubeGeo, tubeMat);
            group.add(stem);

            // Petals: Organic "Frangipani" with complex geometry
            const petalShape = new THREE.SphereGeometry(0.7, 32, 32);
            petalShape.scale(1, 0.15, 1.8);
            
            for(let i = 0; i < 5; i++) {
                const petalMat = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff, 
                    roughness: 0.3, 
                    metalness: 0.1,
                    emissive: 0xff6666,
                    emissiveIntensity: 0
                });
                const petal = new THREE.Mesh(petalShape, petalMat);
                petal.rotation.y = (i * Math.PI * 2) / 5;
                petal.rotation.x = 0.4;
                petal.position.y = 0.1;
                group.add(petal);
            }

            group.position.x = (index - 1) * 2.5;
            group.position.y = -0.5;
            group.rotation.y = Math.random() * Math.PI;
            
            flowers.push(group);
            scene.add(group);
        }

        function loadState() {
            const last = localStorage.getItem('chiara_garden_v2');
            if (last) {
                const hours = (Date.now() - parseInt(last)) / 3600000;
                health = Math.max(0, 1.0 - (hours / 24)); // Dies in 24 hours
            }
        }

        function updateLogic() {
            const txt = document.getElementById('text-evocative');
            
            if (isTouching && health < 1.0) {
                health += 0.005;
                localStorage.setItem('chiara_garden_v2', Date.now());
            } else if (!isTouching) {
                health -= 0.0001; // Constant decay
            }

            // Visual feedback of "Ugly/Wilting" vs "Beautiful/Realistic"
            flowers.forEach((f, idx) => {
                f.scale.setScalar(0.5 + (health * 0.8));
                f.rotation.z = Math.sin(Date.now() * 0.001 + idx) * (0.2 * (1-health)); // Shake if dying
                
                f.children.forEach(child => {
                    if (child.material) {
                        // Color shifts from White/Pink to Bruised Purple/Grey
                        child.material.color.lerpColors(new THREE.Color(0x333333), new THREE.Color(0xffffff), health);
                        child.material.emissiveIntensity = health * 0.5;
                    }
                });
            });

            // Text logic
            txt.style.opacity = 1;
            if (health > 0.8) txt.innerText = messages.bloom[Math.floor(Date.now()/5000 % messages.bloom.length)];
            else if (health > 0.1) txt.innerText = messages.wither[Math.floor(Date.now()/5000 % messages.wither.length)];
            else txt.innerText = messages.gone[0];

            document.getElementById('death-clock').innerText = health > 0 ? `Lien vital : ${Math.floor(health*100)}%` : "DÉCONNECTÉ";
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Camera subtle breath
            camera.position.y = 1.5 + Math.sin(Date.now() * 0.0005) * 0.2;
            
            // Hearts movement
            const pos = hearts.geometry.attributes.position.array;
            for(let i=1; i<pos.length; i+=3) {
                pos[i] -= 0.02 * (health + 0.1); 
                if(pos[i] < -5) pos[i] = 10;
            }
            hearts.geometry.attributes.position.needsUpdate = true;
            hearts.material.opacity = health;

            updateLogic();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
